version: '3.8'

services:
  # PostgreSQL - Base de données
  db:
    image: postgres:16-alpine
    container_name: ai-blog-db
    environment:
      POSTGRES_DB: ${DB_NAME:-ai_blog_db}
      POSTGRES_USER: ${DB_USER:-ai_blog_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - traefik-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ai_blog_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Application Django
  web:
    build: .
    container_name: ai-blog-web
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn ai_blog_app.wsgi:application --bind 0.0.0.0:8000 --workers 4 --timeout 120"
    environment:
      DEBUG: "False"
      DJANGO_SETTINGS_MODULE: ai_blog_app.settings
      SECRET_KEY: ${SECRET_KEY}
      DATABASE_URL: postgresql://${DB_USER:-ai_blog_user}:${DB_PASSWORD}@db:5432/${DB_NAME:-ai_blog_db}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-aib-app.bor-man.dev,localhost,127.0.0.1}
    volumes:
      - ./staticfiles:/app/staticfiles
      - ./media:/app/media
    depends_on:
      db:
        condition: service_healthy
    networks:
      - traefik-network
    restart: unless-stopped
    labels:
      # Traefik configuration
      - "traefik.enable=true"
      - "traefik.http.routers.ai-blog.rule=Host(`aib-app.bor-man.dev`)"
      - "traefik.http.routers.ai-blog.entrypoints=websecure"
      - "traefik.http.routers.ai-blog.tls.certresolver=myresolver"
      - "traefik.http.services.ai-blog.loadbalancer.server.port=8000"
      # Watchtower configuration (auto-update)
      - "com.centurylinklabs.watchtower.enable=true"

  # Traefik - Reverse Proxy + TLS + Load Balancing
  traefik:
    image: traefik:v3.1
    container_name: traefik
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=traefik-network"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      # Redirect HTTP to HTTPS
      - "--entrypoints.web.http.redirections.entrypoint.main=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      # Let's Encrypt TLS
      - "--certificatesresolvers.myresolver.acme.tlschallenge=true"
      - "--certificatesresolvers.myresolver.acme.email=${LETSENCRYPT_EMAIL}"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
      # Dashboard
      - "--api.insecure=false"
      - "--api.dashboard=true"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./letsencrypt:/letsencrypt"
    networks:
      - traefik-network
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`aib-app.bor-man.dev`) && PathPrefix(`/traefik`)"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.tls.certresolver=myresolver"
      - "traefik.http.routers.dashboard.service=api@internal"

  # Watchtower - Auto-update des conteneurs
  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    command: --label-enable --interval 30
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
    networks:
      - traefik-network
    restart: unless-stopped

networks:
  traefik-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
