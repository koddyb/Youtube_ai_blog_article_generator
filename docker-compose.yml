services:
   # PostgreSQL - Base de données
   db:
     image: postgres:16-alpine
     container_name: ai-blog-db
     environment:
       POSTGRES_DB: ai_blog_db
       POSTGRES_USER: ai_blog_user
       POSTGRES_PASSWORD: ${DB_PASSWORD}
     volumes:
       - postgres_data:/var/lib/postgresql/data
     networks:
       - traefik-network
     restart: unless-stopped
     healthcheck:
       test: ["CMD-SHELL", "pg_isready -U ai_blog_user -d ai_blog_db"]
       interval: 10s
       timeout: 5s
       retries: 5

   # Application Django
   web:
     build: .
     container_name: ai-blog-web
     command: >
       sh -c "python manage.py migrate &&
              python manage.py collectstatic --noinput &&
              gunicorn ai_blog_app.wsgi:application --bind 0.0.0.0:8000 --workers 4 --timeout 120"
     environment:
       DEBUG: "False"
       DJANGO_SETTINGS_MODULE: ai_blog_app.settings
       SECRET_KEY: ${SECRET_KEY}
       DATABASE_URL: postgresql://ai_blog_user:${DB_PASSWORD}@db:5432/ai_blog_db
       ALLOWED_HOSTS: ${ALLOWED_HOSTS}
     volumes:
       - ./staticfiles:/app/staticfiles
       - ./media:/app/media
     depends_on:
       db:
         condition: service_healthy
     networks:
       - traefik-network
     restart: unless-stopped
     labels:
       - "traefik.enable=true"
       - "traefik.http.routers.ai-blog.rule=Host(`aib-app.bor-man.dev`)"
       - "traefik.http.routers.ai-blog.entrypoints=websecure"
       - "traefik.http.routers.ai-blog.tls.certresolver=myresolver"
       - "traefik.http.services.ai-blog.loadbalancer.server.port=8000"
       - "com.centurylinklabs.watchtower.enable=true"

   # Traefik - Reverse Proxy + TLS + Load Balancing
   traefik:
     image: traefik:v3.1
     container_name: traefik
     command:
      - "--api.insecure=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=traefik-network"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--certificatesresolvers.myresolver.acme.tlschallenge=true"
      - "--certificatesresolvers.myresolver.acme.email=${LETSENCRYPT_EMAIL}"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
     ports:
       - "80:80"
       - "443:443"
     volumes:
       - "/var/run/docker.sock:/var/run/docker.sock:ro"
       - "./letsencrypt:/letsencrypt"
     networks:
       - traefik-network
     restart: unless-stopped

   # Watchtower - Auto-update des conteneurs
   watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    environment:
      - DOCKER_API_VERSION=1.40  # <--- La ligne magique qui règle ton erreur
    command: --label-enable --interval 300 --cleanup
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
    restart: always

networks:
   traefik-network:
     driver: bridge

volumes:
   postgres_data:
     driver: local