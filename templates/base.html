{% load static %}
<!DOCTYPE html>
<html lang="en" class="">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}YT_BlogAI{% endblock %}</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@400;500;600;700&family=Source+Code+Pro:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="{% static 'blog_generator/css/main.css' %}">
    {% block head_extra %}{% endblock %}
</head>
<body class="flex flex-col min-h-screen bg-background text-foreground antialiased">

    <!-- Navbar -->
    <header class="sticky top-0 z-50 w-full nav-glass">
        <nav class="container mx-auto px-4 sm:px-6 h-14 flex items-center justify-between">
            <!-- Logo - solid color -->
            <a href="/" class="logo">
                <i class="fa-solid fa-bolt"></i>
                <span>YTB-AI</span>
            </a>

            <div class="nav-actions flex items-center gap-3">
                <!-- Theme Toggle -->
                <button id="themeToggle" class="theme-toggle-btn" aria-label="Toggle theme">
                    <i class="fa-solid fa-sun theme-icon-light"></i>
                    <i class="fa-solid fa-moon theme-icon-dark"></i>
                </button>
                
                {% if user.is_authenticated %}
                    <span class="nav-username text-sm text-muted-foreground hidden sm:inline">{{ user.username }}</span>
                    <div class="separator-vertical h-5 hidden sm:block"></div>
                    <a href="/blog-list"><button class="btn-outline btn-sm">My Blogs</button></a>
                    <a href="/logout"><button class="btn-danger btn-sm">Logout</button></a>
                {% else %}
                    <a href="/login"><button class="btn-outline btn-sm">Login</button></a>
                    <a href="/signup"><button class="btn-primary btn-sm">Sign up</button></a>
                {% endif %}
            </div>
        </nav>
    </header>

    <!-- Main content -->
    <main class="flex-1 container mx-auto px-4 py-8 sm:py-12">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="footer-border border-t py-4">
        <div class="container mx-auto px-4 text-center text-sm">
            Powered by <a href="https://koddyb.github.io/my-portfolio/" class="footer-link">KoddyB</a>
        </div>
    </footer>

    <!-- Toast container -->
    <div id="toast-container" role="region" aria-live="polite"></div>

    <script>
        /* ── Theme Toggle System ── */
        (function() {
            const htmlElement = document.documentElement;
            const themeToggleBtn = document.getElementById('themeToggle');
            
            function initTheme() {
                const savedTheme = localStorage.getItem('theme');
                const theme = savedTheme || 'light';
                
                if (theme === 'dark') {
                    htmlElement.classList.add('dark');
                } else {
                    htmlElement.classList.remove('dark');
                }
            }
            
            function toggleTheme() {
                const isDark = htmlElement.classList.contains('dark');
                
                if (isDark) {
                    htmlElement.classList.remove('dark');
                    localStorage.setItem('theme', 'light');
                } else {
                    htmlElement.classList.add('dark');
                    localStorage.setItem('theme', 'dark');
                }
            }
            
            initTheme();
            
            if (themeToggleBtn) {
                themeToggleBtn.addEventListener('click', toggleTheme);
            }
        })();
        
        /* ── Toast system ── */
        const _T_ICONS = {
            success: '<i class="fa-solid fa-circle-check"></i>',
            error:   '<i class="fa-solid fa-circle-xmark"></i>',
            warning: '<i class="fa-solid fa-triangle-exclamation"></i>',
            info:    '<i class="fa-solid fa-circle-info"></i>'
        };
        const _T_TITLES = { success: 'Succès', error: 'Erreur', warning: 'Attention', info: 'Info' };

        function showToast(message, type = 'info', title = null, duration = 4000) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.innerHTML = `
                <span class="toast-icon">${_T_ICONS[type] ?? '<i class="fa-solid fa-circle-info"></i>'}</span>
                <div class="toast-body">
                    <div class="toast-title">${title ?? _T_TITLES[type] ?? ''}</div>
                    ${message ? `<div class="toast-message">${message}</div>` : ''}
                </div>
                <button class="toast-close" aria-label="Fermer">✕</button>
                <div class="toast-progress" style="animation-duration:${duration}ms"></div>
            `;
            toast.querySelector('.toast-close').addEventListener('click', () => _removeToast(toast));
            container.appendChild(toast);
            setTimeout(() => _removeToast(toast), duration);
        }

        function _removeToast(toast) {
            if (!toast || toast.classList.contains('removing')) return;
            toast.classList.add('removing');
            setTimeout(() => toast.remove(), 280);
        }

        /* ── Confirm modal ── */
        function showConfirm({ icon = '<i class="fa-solid fa-trash-can"></i>', title = 'Confirmation', message = '', confirmText = 'Confirmer', confirmClass = 'btn-danger', onConfirm }) {
            const overlay = document.createElement('div');
            overlay.className = 'modal-overlay';
            overlay.innerHTML = `
                <div class="modal-box">
                    <div class="modal-icon">${icon}</div>
                    <div class="modal-title">${title}</div>
                    <div class="modal-message">${message}</div>
                    <div class="modal-actions">
                        <button class="btn-outline btn-sm modal-cancel">Annuler</button>
                        <button class="${confirmClass} btn-sm modal-confirm">${confirmText}</button>
                    </div>
                </div>
            `;
            document.body.appendChild(overlay);
            overlay.querySelector('.modal-cancel').addEventListener('click', () => overlay.remove());
            overlay.querySelector('.modal-confirm').addEventListener('click', () => { overlay.remove(); onConfirm(); });
            overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
        }

        /* ── Render Django messages as toasts on page load ── */
        document.addEventListener('DOMContentLoaded', () => {
            {% for message in messages %}
            showToast("{{ message|escapejs }}", "{{ message.level_tag }}");
            {% endfor %}
        });
    </script>

    {% block scripts %}{% endblock %}
</body>
</html>
