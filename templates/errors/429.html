{% extends "base.html" %}
{% block title %}429 — Trop de requêtes{% endblock %}

{% block content %}
<div class="flex flex-col items-center justify-center min-h-[60vh] text-center px-4">
    <div class="text-8xl font-bold text-yellow-500 mb-4">429</div>
    <h1 class="text-2xl font-bold text-foreground mb-2">Trop de requêtes</h1>
    <p class="text-muted-foreground mb-8 max-w-md">
        Vous avez effectué trop de requêtes en peu de temps. Veuillez patienter quelques minutes avant de réessayer.
    </p>
    <div class="flex gap-3">
        <button onclick="location.reload()" class="btn-outline">
            <i class="fa-solid fa-rotate-right"></i>
            Réessayer
        </button>
        <a href="/">
            <button class="btn-primary">
                <i class="fa-solid fa-house"></i>
                Retour à l'accueil
            </button>
        </a>
    </div>
</div>
{% endblock %}
