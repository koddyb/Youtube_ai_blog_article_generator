{% extends "base.html" %}
{% block title %}500 — Erreur serveur{% endblock %}

{% block content %}
<div class="flex flex-col items-center justify-center min-h-[60vh] text-center px-4">
    <div class="text-8xl font-bold text-orange-500 mb-4">500</div>
    <h1 class="text-2xl font-bold text-foreground mb-2">Erreur interne du serveur</h1>
    <p class="text-muted-foreground mb-8 max-w-md">
        Une erreur inattendue s'est produite. Notre équipe a été notifiée et travaille à résoudre le problème.
    </p>
    <div class="flex gap-3">
        <button onclick="location.reload()" class="btn-outline">
            <i class="fa-solid fa-rotate-right"></i>
            Réessayer
        </button>
        <a href="/">
            <button class="btn-primary">
                <i class="fa-solid fa-house"></i>
                Retour à l'accueil
            </button>
        </a>
    </div>
</div>
{% endblock %}
