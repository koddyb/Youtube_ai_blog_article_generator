{% extends "base.html" %}
{% block title %}Sign up — BlogAI{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[65vh]">
    <div class="w-full max-w-sm">
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-foreground mb-2">Create account</h1>
            <p class="text-sm text-muted-foreground">Start generating AI blog articles today</p>
        </div>

        <!-- Form Card -->
        <div class="card card-padded">
            <form class="space-y-4" action="" method="POST">
                {% csrf_token %}
                {% if error_message %}
                <div class="error-alert flex items-center gap-2">
                    <i class="fa-solid fa-triangle-exclamation"></i>
                    <span>{{ error_message }}</span>
                </div>
                {% endif %}

                <div class="space-y-2">
                    <label class="text-sm font-medium text-foreground" for="username">Username</label>
                    <input type="text" id="username" name="username" class="input-dark" placeholder="your_username">
                </div>
                
                <div class="space-y-2">
                    <label class="text-sm font-medium text-foreground" for="email">Email</label>
                    <input type="email" id="email" name="email" class="input-dark" placeholder="you@example.com">
                </div>
                
                <div class="space-y-2">
                    <label class="text-sm font-medium text-foreground" for="password">Password</label>
                    <input type="password" id="password" name="password" class="input-dark" placeholder="••••••••">
                </div>
                
                <div class="space-y-2">
                    <label class="text-sm font-medium text-foreground" for="confirm_password">Confirm Password</label>
                    <input type="password" id="confirm_password" name="confirm_password" class="input-dark" placeholder="••••••••">
                </div>

                <button type="submit" class="btn-primary w-full mt-4">
                    Create Account
                    <i class="fa-solid fa-arrow-right"></i>
                </button>
            </form>

            <div class="separator my-6"></div>

            <p class="text-center text-sm text-muted-foreground">
                Already have an account?
                <a href="/login" class="auth-link font-medium">Login</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
